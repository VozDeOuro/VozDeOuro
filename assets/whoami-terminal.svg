<svg xmlns="http://www.w3.org/2000/svg" width="740" height="400" viewBox="0 0 740 400" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace">
  <style>
    text { font-size: 14px; }
    .t { animation-duration: 14s; animation-iteration-count: infinite; }
    .fg    { fill: #dfd0f0; }
    .white { fill: #ffffff; }
    .user  { fill: #a87cd8; }
    .path  { fill: #cd9ce1; }
    .accent{ fill: #9865cf; }
    .hl    { fill: #cb97df; }
    .err   { fill: #5b43cd; }

    @keyframes show { from { opacity: 0; } to { opacity: 1; } }

    .l0  { opacity: 0; animation: appear0 14s infinite; }
    @keyframes appear0  { 0%,1%   { opacity: 0; } 2%,100%  { opacity: 1; } }
    .l1  { opacity: 0; animation: appear1 14s infinite; }
    @keyframes appear1  { 0%,14%  { opacity: 0; } 15%,100% { opacity: 1; } }
    .l2  { opacity: 0; animation: appear2 14s infinite; }
    @keyframes appear2  { 0%,17%  { opacity: 0; } 18%,100% { opacity: 1; } }
    .l3  { opacity: 0; animation: appear3 14s infinite; }
    @keyframes appear3  { 0%,20%  { opacity: 0; } 21%,100% { opacity: 1; } }
    .l4  { opacity: 0; animation: appear4 14s infinite; }
    @keyframes appear4  { 0%,23%  { opacity: 0; } 24%,100% { opacity: 1; } }
    .l5  { opacity: 0; animation: appear5 14s infinite; }
    @keyframes appear5  { 0%,26%  { opacity: 0; } 27%,100% { opacity: 1; } }
    .l6  { opacity: 0; animation: appear6 14s infinite; }
    @keyframes appear6  { 0%,29%  { opacity: 0; } 30%,100% { opacity: 1; } }
    .l7  { opacity: 0; animation: appear7 14s infinite; }
    @keyframes appear7  { 0%,40%  { opacity: 0; } 41%,100% { opacity: 1; } }
    .l8  { opacity: 0; animation: appear8 14s infinite; }
    @keyframes appear8  { 0%,57%  { opacity: 0; } 58%,100% { opacity: 1; } }
    .l9  { opacity: 0; animation: appear9 14s infinite; }
    @keyframes appear9  { 0%,63%  { opacity: 0; } 64%,100% { opacity: 1; } }

    .type1 { animation: typing1 14s infinite; }
    @keyframes typing1 { 0%,2% { width: 0; animation-timing-function: steps(16, end); } 12%,100% { width: 140px; } }
    .type2 { animation: typing2 14s infinite; }
    @keyframes typing2 { 0%,41% { width: 0; animation-timing-function: steps(21, end); } 53%,100% { width: 182px; } }

    .cursor { animation: blink 1s steps(1, end) infinite; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  </style>

  <!-- window -->
  <rect x="1" y="1" width="738" height="398" rx="10" fill="#020007" stroke="#9865cf" stroke-width="1.5"/>
  <rect x="1" y="1" width="738" height="34" rx="10" fill="#0b0417"/>
  <rect x="1" y="25" width="738" height="10" fill="#0b0417"/>
  <circle cx="22" cy="18" r="6" fill="#5b43cd"/>
  <circle cx="42" cy="18" r="6" fill="#9845c6"/>
  <circle cx="62" cy="18" r="6" fill="#b895dd"/>
  <text x="370" y="23" text-anchor="middle" class="accent" font-size="12">lucas@lcsv: ~ — zsh</text>

  <!-- cmd 1 -->
  <g class="l0">
    <text x="24" y="70"><tspan class="user">lucas@lcsv</tspan><tspan class="white">:</tspan><tspan class="path">~</tspan><tspan class="white">$ </tspan></text>
    <clipPath id="c1"><rect class="type1" x="142" y="56" width="0" height="20"/></clipPath>
    <text x="142" y="70" class="white" clip-path="url(#c1)">cat /etc/profile</text>
  </g>

  <!-- profile output -->
  <text x="24" y="102" class="l1 white" font-weight="bold">Cyber Security Analyst <tspan class="accent">—</tspan> 6+ years breaking &amp; defending</text>
  <text x="24" y="130" class="l2 fg"><tspan class="hl">⚡</tspan> Red team + Blue team: pentest, threat hunt, IR, vuln mgmt</text>
  <text x="24" y="154" class="l3 fg"><tspan class="hl">🐍</tspan> Automation: vuln triage 2h <tspan class="user">→</tspan> 5min with Python &amp; Bash</text>
  <text x="24" y="178" class="l4 fg"><tspan class="hl">🎯</tspan> YARA rules, malware RE (IDA Pro, x64dbg), APT hunting</text>
  <text x="24" y="202" class="l5 fg"><tspan class="hl">🏠</tspan> Homelab: Unraid, 30+ containers, dual-WAN, self-hosted everything</text>
  <text x="24" y="226" class="l6 fg"><tspan class="hl">📍</tspan> Toronto, ON — Postgrad Cyber Security @ Seneca</text>

  <!-- cmd 2: joke -->
  <g class="l7">
    <text x="24" y="266"><tspan class="user">lucas@lcsv</tspan><tspan class="white">:</tspan><tspan class="path">~</tspan><tspan class="white">$ </tspan></text>
    <clipPath id="c2"><rect class="type2" x="142" y="252" width="0" height="20"/></clipPath>
    <text x="142" y="266" class="white" clip-path="url(#c2)">sudo pacman -S coffee</text>
  </g>
  <text x="24" y="294" class="l8 err">error: target not found: coffee</text>
  <text x="24" y="318" class="l8 fg"><tspan class="accent">#</tspan> fine. brewing manually. threat hunting resumes in 5 min.</text>

  <!-- final prompt -->
  <g class="l9">
    <text x="24" y="352"><tspan class="user">lucas@lcsv</tspan><tspan class="white">:</tspan><tspan class="path">~</tspan><tspan class="white">$ </tspan></text>
    <rect class="cursor" x="144" y="340" width="9" height="16" fill="#ffffff"/>
  </g>
</svg>

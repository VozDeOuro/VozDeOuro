name: Generate contribution snake

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg?palette=github-light
            assets/github-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#161b22,#460b46,#83107f,#c414bd,#ff00ff

      - name: Commit updated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --staged --quiet || git commit -m "chore: update contribution snake"
          git push
